<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCSER Admin — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 14px;
      padding: 40px; width: 400px;
    }
    h1 { font-size: 22px; color: #58a6ff; margin-bottom: 6px; }
    .sub { color: #8b949e; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 5px; font-weight: 500; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid #30363d;
      border-radius: 8px; font-size: 14px; margin-bottom: 18px;
      outline: none; background: #0d1117; color: #e6edf3; transition: border 0.2s;
    }
    input:focus { border-color: #58a6ff; }
    button {
      width: 100%; padding: 11px; background: #238636; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #2ea043; }
    .error { color: #f85149; font-size: 13px; margin-bottom: 14px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ RCSER</h1>
    <p class="sub">Admin Panel — Sign in</p>
    <div class="error" id="error" style="display:none">Invalid username or password</div>
    <form method="POST" action="/admin/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
  <script>
    if (location.search.includes('error=1')) document.getElementById('error').style.display = 'block';
  </script>
</body>
</html>
